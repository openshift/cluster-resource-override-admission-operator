inheritance: true
language: en-US
reviews:
  profile: chill
  high_level_summary: true
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: true
  estimate_code_review_effort: false
  poem: false
  suggested_labels: false
  path_filters:
    # Vendor directory (managed by go mod vendor)
    - "!vendor/**"

    # Generated deepcopy and other zz_generated files
    - "!**/zz_generated*.go"

    # Generated client code (clientsets, informers, listers)
    - "!pkg/generated/**"

    # Generated protobuf files
    - "!**/*.pb.go"
    - "!**/*.pb.gw.go"

    # OLM bundle (generated by hack/generate-bundle.sh)
    - "!bundle/**"

    # Build output
    - "!_output/**"
    - "!bin/**"

  tools:
    golangci-lint:
      enabled: true
    gitleaks:
      enabled: true
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - AGENTS.md
      - .cursor/rules/*.mdc
  learnings:
    scope: local
