apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceoverrides.autoscaling.openshift.io
spec:
  conversion:
    strategy: None
  group: autoscaling.openshift.io
  scope: Namespaced
  names:
    plural: resourceoverrides
    singular: resourceoverride
    kind: ResourceOverride
    listKind: ResourceOverrideList
    shortNames:
    - ro
  versions:
  - name: v1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        description: Allows namespace administrator to control the level of overcommit and manage pod density on nodes.
        properties:
          spec:
            type: object
            description: Spec for a ResourceOverride.
            properties:
              podResourceOverride:
                type: object
                description: A Pod resource override.
                properties:
                  forceSelinuxRelabel:
                    type: boolean
                    description: (optional, false) Enable the SElinux relabelling fix.
                  memoryRequestToLimitPercent:
                    type: integer
                    description: (optional, 1-100) If a container memory limit has been specified or defaulted, the memory request is overridden to this percentage of the limit.
                    minimum: 1
                    maximum: 100
                  cpuRequestToLimitPercent:
                    type: integer
                    description: (optional, 1-100) If a container CPU limit has been specified or defaulted, the CPU request is overridden to this percentage of the limit.
                    minimum: 1
                    maximum: 100
                  limitCPUToMemoryPercent:
                    type: integer
                    description: (optional, positive integer) If a container memory limit has been specified or defaulted, the CPU limit is overridden to a percentage of the memory limit, with a 100 percentage scaling 1Gi of RAM to equal 1 CPU core. This is processed prior to overriding CPU request (if configured).
                    minimum: 0
                  cpuRequestToRequestPercent:
                    type: integer
                    description: (optional, 1-100) If a container CPU request has been specified or defaulted, the CPU request is overridden to this percentage of the existing CPU request. This is processed after all configured overrides.
                    minimum: 1
                    maximum: 100
              podSelector:
                type: object
                description: (optional) A label selector to target specific pods. If empty or not specified, the override applies to all pods in the namespace.
                properties:
                  matchLabels:
                    type: object
                    description: A map of key-value pairs. A pod must match all labels to be selected.
                    additionalProperties:
                      type: string
                  matchExpressions:
                    type: array
                    description: A list of label selector requirements. A pod must satisfy all requirements to be selected.
                    items:
                      type: object
                      required:
                        - key
                        - operator
                      properties:
                        key:
                          type: string
                          description: The label key that the selector applies to.
                        operator:
                          type: string
                          description: The operator relating the key to the values. Valid operators are In, NotIn, Exists, and DoesNotExist.
                          enum:
                            - In
                            - NotIn
                            - Exists
                            - DoesNotExist
                        values:
                          type: array
                          description: An array of string values. Required for In and NotIn operators.
                          items:
                            type: string
          status:
            type: object
            description: The status of the ResourceOverride
            x-kubernetes-preserve-unknown-fields: true
